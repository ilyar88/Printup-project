name: Run PrintUp website tests

# Manually triggered — select a browser before running
on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Choose your browser'
        required: true
        default: 'chrome'
        type: choice
        options: [chrome, firefox, edge]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Configuration_settings  # supplies credentials and env vars
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        env:
          HEADLESS: 'true'
        run: npx playwright test --config=configuration/playwright.config.js --project ${{ github.event.inputs.browser }}

      - name: Generate Allure report
        if: always()  # generate report even if tests fail
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.event.inputs.browser }}
          path: allure-report/
          retention-days: 30

  load-test:
    needs: test  # runs after E2E tests complete
    runs-on: ubuntu-latest
    environment: Configuration_settings
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 load test
        uses: ./.github/actions/k6-load-test
        with:
          base_url: ${{ vars.URL }}

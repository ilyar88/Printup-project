name: Run PrintUp website tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Choose your browser'
        required: true
        default: 'chrome'
        type: choice
        options: [chrome, firefox, edge]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx playwright test --config=configuration/playwright.config.js --project ${{ github.event.inputs.browser }}

      - name: Generate Allure report
        if: always() 
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.event.inputs.browser }}
          path: allure-report/
          retention-days: 30
